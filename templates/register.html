<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EPG Aggregator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="d-flex align-items-center min-vh-100 py-5">
    <div class="container" style="max-width: 450px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="/" class="text-decoration-none text-body">
                <h1 class="h4 mb-0">EPG Aggregator</h1>
            </a>
            <button id="themeToggle" class="btn btn-outline-secondary btn-sm">🌓 Theme</button>
        </div>

        <div class="card shadow border-0">
            <div class="card-header bg-success text-white py-3">
                <h5 class="mb-0">Create Account</h5>
            </div>
            <div class="card-body p-4">
                {% with messages = get_flashed_messages() %}
                  {% if messages %}
                    {% for message in messages %}
                      <div class="alert alert-info small">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Choose Username</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Choose Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Create Account</button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="/login" class="text-muted small text-decoration-none">Already have an account? Login</a>
        </div>
    </div>

    <script>
    (function() {
        const html = document.documentElement;
        const themeBtn = document.getElementById('themeToggle');
        const storedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        html.setAttribute('data-bs-theme', storedTheme);
        if (themeBtn) {
            themeBtn.addEventListener('click', () => {
                const newTheme = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });
        }
    })();
    </script>
</body>
</html>
